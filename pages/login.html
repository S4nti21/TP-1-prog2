<!DOCTYPE html>
<html lang="es" data-modo="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - Lana & Lino</title>
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

  <button class="btn-modo" id="btnModo" type="button">
    <span class="btn-modo__icono" id="iconoModo">☀️</span>
    <span class="btn-modo__texto">Modo</span>
  </button>

  <div class="auth-pagina">

    <aside class="auth-panel-deco">
      <div class="auth-panel-deco__linea"></div>
      <h1 class="auth-panel-deco__marca">Lana<br>&amp;<br>Lino</h1>
      <p class="auth-panel-deco__tagline">Indumentaria de autor</p>
      <div class="auth-panel-deco__linea"></div>
    </aside>

    <main class="auth-panel-form">
      <div class="auth-card">

        <h2 class="auth-card__titulo">Bienvenido</h2>
        <p class="auth-card__subtitulo">
          ¿No tenés cuenta?
          <a href="registro.html">Registrate aquí</a>
        </p>

        <form class="auth-form" id="formLogin" novalidate>

          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" />
            <span class="campo__error" id="errorEmail"></span>
          </div>

          <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" />
            <span class="campo__error" id="errorPassword"></span>
          </div>

          <div class="mensaje" id="mensajeGlobal"></div>

          <button type="submit" class="btn-principal" id="btnLogin">
            Iniciar Sesión
          </button>

        </form>

      </div>
    </main>

  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/login.js"></script>

</body>
</html>
