<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Pago | Lana & Lino</title>


    <link rel="stylesheet" href="../css/pago.css">


    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- =========================================================
         HEADER
    ========================================================= -->

    <header class="header">

        <!-- LOGO -->
        <div class="header-logo">

            <a href="../index.html">
                LANA & LINO
            </a>

        </div>

        <!-- MENU -->
        <nav class="header-menu">

            <a href="#">SHOP</a>

            <a href="#">NEW</a>

            <a href="#">FAVORITOS</a>

        </nav>

        <!-- ICONOS -->
        <div class="header-icons">

            <!-- BUSCAR -->
            <button class="icon-btn">

                <i class="fa-solid fa-magnifying-glass"></i>

            </button>

            <!-- USER -->
            <button class="icon-btn">

                <i class="fa-regular fa-user"></i>

            </button>

            <!-- MODO -->
                    <button
                    id="themeButton"
                    class="icon-btn theme-btn">

                    <i
                        id="themeIcon"
                        class="fa-solid fa-moon">

                    </i>

</button>
            <!-- CARRITO -->
            <a href="./carrito.html"
                class="cart-icon">

                <i class="fa-solid fa-bag-shopping"></i>

            </a>

        </div>

    </header>

    <!-- =========================================================
         MAIN
    ========================================================= -->

    <main class="payment-container">

        <!-- =====================================================
             IZQUIERDA
        ====================================================== -->

        <section class="payment-form-section">

            <!-- TITULO -->
            <div class="payment-title">

                <h1>PAGO</h1>

                <p>
                    Completa los datos para finalizar la compra.
                </p>

            </div>

            <!-- FORM -->
            <form id="paymentForm"
                class="payment-form">

                <!-- METODO -->
                <div class="form-group">

                    <label for="paymentMethod">

                        Método de pago

                    </label>

                    <select id="paymentMethod">

                        <option value="">
                            Seleccionar
                        </option>

                        <option value="transferencia">
                            Transferencia
                        </option>

                        <option value="debito">
                            Débito
                        </option>

                        <option value="credito">
                            Crédito
                        </option>

                    </select>

                </div>

                <!-- CAMPOS TARJETA -->
                <div id="cardFields">

                    <!-- NUMERO -->
                    <div class="form-group">

                        <label for="cardNumber">

                            Número de tarjeta

                        </label>

                        <input
                            type="text"
                            id="cardNumber"
                            placeholder="1234 5678 9012 3456">

                    </div>

                    <!-- TITULAR -->
                    <div class="form-group">

                        <label for="cardName">

                            Nombre del titular

                        </label>

                        <input
                            type="text"
                            id="cardName"
                            placeholder="Juan Pérez">

                    </div>

                    <!-- FILA -->
                    <div class="form-row">

                        <!-- FECHA -->
                        <div class="form-group">

                            <label for="cardDate">

                                Vencimiento

                            </label>

                            <input
                                type="text"
                                id="cardDate"
                                placeholder="MM/AA">

                        </div>

                        <!-- CVV -->
                        <div class="form-group">

                            <label for="cardCvv">

                                CVV

                            </label>

                            <input
                                type="text"
                                id="cardCvv"
                                placeholder="123">

                        </div>

                    </div>

                </div>

                <!-- MENSAJE -->
                <div
                    id="paymentMessage"
                    class="payment-message">

                </div>

                <!-- BOTON -->
                <button
                    type="submit"
                    id="btnPagar"
                    class="btn-pay"
                    disabled>

                    PAGAR

                </button>

            </form>

        </section>

        <!-- =====================================================
             DERECHA
        ====================================================== -->

        <aside class="payment-summary">

            <h2>RESUMEN</h2>

            <!-- PRODUCTOS -->
            <div id="summaryProducts">

                <!-- JS -->

            </div>

            <!-- TOTAL -->
            <div class="payment-total">

                <span>Total</span>

                <span id="paymentTotal">
                    $0
                </span>

            </div>

        </aside>

    </main>

    <!-- =========================================================
         FOOTER
    ========================================================= -->

    <footer class="footer">

        <div class="footer-top">

            <!-- BRAND -->
            <div class="footer-brand">

                <h2>LANA & LINO</h2>

                <p>
                    Streetwear & Urban Style
                </p>

            </div>

            <!-- LINKS -->
            <div class="footer-links">

                <a href="#">
                    Instagram
                </a>

                <a href="#">
                    TikTok
                </a>

                <a href="#">
                    Contacto
                </a>

            </div>

        </div>

        <!-- BOTTOM -->
        <div class="footer-bottom">

            <p>
                © 2026 Lana & Lino - Grupo 4
            </p>

        </div>

    </footer>

    <!-- AUTH -->
    <script src="../js/auth.js"></script>

    <!-- JS -->
    <script src="../js/pago.js"></script>

</body>

</html>
