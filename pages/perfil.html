<!DOCTYPE html>
<html lang="es" data-modo="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - Lana & Lino</title>
  <link rel="stylesheet" href="../css/perfil.css" />
</head>
<body>
  
  <!-- Pantalla de carga -->
  <div id="cargandoPerfil" style="
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);">
    Cargando perfil...
  </div>

  <!-- Contenido del perfil -->
  <main class="perfil-pagina" id="paginaPerfil" style="display: none;">

    <header class="perfil-header">
      <p class="perfil-header__marca">Lana &amp; Lino</p>
      <h1 class="perfil-header__titulo">Mi Perfil</h1>
    </header>

    <!-- Datos personales -->
    <section class="perfil-seccion" id="seccionDatos">
      <h2 class="perfil-seccion__titulo">Datos personales</h2>

      <div class="perfil-datos-grid">

        <div class="campo dato-lectura">
          <span class="dato-lectura__etiqueta">Nombre</span>
          <span class="dato-lectura__valor" id="verNombre">—</span>
          <input type="text" id="editNombre" placeholder="Nombre" />
          <span class="campo__error" id="errorNombre"></span>
        </div>

        <div class="campo dato-lectura">
          <span class="dato-lectura__etiqueta">Apellido</span>
          <span class="dato-lectura__valor" id="verApellido">—</span>
          <input type="text" id="editApellido" placeholder="Apellido" />
          <span class="campo__error" id="errorApellido"></span>
        </div>

        <div class="dato-lectura" style="grid-column: 1 / -1;">
          <span class="dato-lectura__etiqueta">Email</span>
          <span class="dato-lectura__valor" id="verEmail">—</span>
        </div>

        <div class="campo dato-lectura">
          <span class="dato-lectura__etiqueta">Teléfono</span>
          <span class="dato-lectura__valor" id="verTelefono">—</span>
          <input type="tel" id="editTelefono" placeholder="Teléfono" />
          <span class="campo__error" id="errorTelefono"></span>
        </div>

        <div class="campo dato-lectura">
          <span class="dato-lectura__etiqueta">Dirección</span>
          <span class="dato-lectura__valor" id="verDireccion">—</span>
          <input type="text" id="editDireccion" placeholder="Dirección" />
          <span class="campo__error" id="errorDireccion"></span>
        </div>

      </div>

      <div class="mensaje" id="mensajePerfil" style="margin-top: 1rem;"></div>

      <div class="perfil-acciones" style="margin-top: 1.5rem;">
        <button class="btn-principal" id="btnEditar" type="button">Editar datos</button>
        <button class="btn-principal" id="btnGuardar" type="button" style="display: none;">Guardar cambios</button>
        <button class="btn-secundario" id="btnCancelar" type="button" style="display: none;">Cancelar</button>
      </div>
    </section>

    <!-- Cuenta -->
    <section class="perfil-seccion">
      <h2 class="perfil-seccion__titulo">Cuenta</h2>
      <div class="perfil-acciones">
        <a href="index.html" class="btn-secundario">← Volver al inicio</a>
        <button class="btn-cerrar-sesion" id="btnCerrarSesion" type="button">Cerrar sesión</button>
      </div>
    </section>

    <!-- Solo admin -->
    <section class="perfil-seccion" data-rol="admin" style="display: none;">
      <h2 class="perfil-seccion__titulo">Administración</h2>
      <p style="font-size: 0.875rem; color: var(--c-suave); margin-bottom: 1rem;">
        Tenés permisos de administrador.
      </p>
      <a href="admin.html" class="btn-principal" style="text-decoration: none; text-align: center;">
        Gestionar productos
      </a>
    </section>

  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/perfil.js"></script>

</body>
</html>
