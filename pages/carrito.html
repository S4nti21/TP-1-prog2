
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Carrito | Lana & Lino</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/carrito.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- =========================================================
         HEADER
    ========================================================= -->

    <header class="header">

        <!-- LOGO -->
        <div class="header-logo">

            <a href="./index.html">
                LANA & LINO
            </a>

        </div>

        <!-- MENU -->
        <nav class="header-menu">

            <a href="#">SHOP</a>

            <a href="#">NEW</a>

            <a href="#">FAVORITOS</a>

        </nav>

        <!-- ICONOS -->
        <div class="header-icons">

            <!-- BUSCAR -->
            <button class="icon-btn">

                <i class="fa-solid fa-magnifying-glass"></i>

            </button>

            <!-- USER -->
            <button class="icon-btn">

                <i class="fa-regular fa-user"></i>

            </button>

            <!-- MODO -->
            <button
                id="themeButton"
                class="icon-btn theme-btn">

                <i
                    id="themeIcon"
                    class="fa-solid fa-moon">

                </i>

            </button>
            <!-- CARRITO -->
            <div class="cart-icon">

                <i class="fa-solid fa-bag-shopping"></i>

                <span id="cartCounter">0</span>

            </div>

        </div>

    </header>

    <!-- =========================================================
         MAIN
    ========================================================= -->

    <main class="cart-container">

        <!-- IZQUIERDA -->
        <section class="cart-products">

            <!-- TITULO -->
            <div class="cart-title">

                <h1>CARRITO</h1>

                <p id="cartSubtitle">
                    0 productos agregados
                </p>

            </div>

            <!-- PRODUCTOS -->
            <div id="cartProducts">

                <!-- JS -->

            </div>

        </section>

        <!-- DERECHA -->
        <aside class="cart-summary">

            <h2>RESUMEN</h2>

            <!-- SUBTOTAL -->
            <div class="summary-line">

                <span>Subtotal</span>

                <span id="subtotal">
                    $0
                </span>

            </div>

            <!-- ENVIO -->
            <div class="summary-line">

                <span>Envío</span>

                <span>
                    Gratis
                </span>

            </div>

            <!-- TOTAL -->
            <div class="summary-total">

                <span>Total</span>

                <span id="total">
                    $0
                </span>

            </div>

            <!-- BOTON -->
            <button
                id="checkoutButton"
                class="btn-checkout">

                FINALIZAR COMPRA

            </button>

            <!-- TEXTO -->
            <p class="summary-text">

                Los impuestos y costos de envío
                se calculan al finalizar la compra.

            </p>

        </aside>

    </main>

    <!-- =========================================================
         FOOTER
    ========================================================= -->

    <footer class="footer">

        <div class="footer-top">

            <!-- BRAND -->
            <div class="footer-brand">

                <h2>LANA & LINO</h2>

                <p>
                    Streetwear & Urban Style
                </p>

            </div>

            <!-- LINKS -->
            <div class="footer-links">

                <a href="#">
                    Instagram
                </a>

                <a href="#">
                    TikTok
                </a>

                <a href="#">
                    Contacto
                </a>

            </div>

        </div>

        <!-- BOTTOM -->
        <div class="footer-bottom">

            <p>
                © 2026 Lana & Lino - Grupo 4
            </p>

        </div>

    </footer>

    <!-- AUTH -->
    <script src="../js/auth.js"></script>

    <!-- JS -->
    <script src="../js/carrito.js"></script>

</body>

</html>
```
