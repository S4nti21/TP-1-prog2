<!DOCTYPE html>
<html lang="es" data-modo="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta - Lana & Lino</title>
  <link rel="stylesheet" href="../css/auth-base.css" />
  <link rel="stylesheet" href="../css/registro.css" />
</head>
<body>

  <div class="auth-overlay"></div>

  <div class="auth-pagina">
    <main class="auth-panel-form">
      <div class="auth-card">

        <span class="auth-card__marca">Lana &amp; Lino</span>
        <h2 class="auth-card__titulo">Crear cuenta</h2>
        <p class="auth-card__subtitulo">
          ¿Ya tenés cuenta?
          <a href="login.html">Iniciá sesión</a>
        </p>

        <form class="auth-form auth-form--dos-col" id="formRegistro" novalidate>

          <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: María" />
            <span class="campo__error" id="errorNombre"></span>
          </div>

          <div class="campo">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" placeholder="Ej: García" />
            <span class="campo__error" id="errorApellido"></span>
          </div>

          <div class="campo campo-completo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" />
            <span class="campo__error" id="errorEmail"></span>
          </div>

          <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" />
            <span class="campo__error" id="errorPassword"></span>
          </div>

          <div class="campo">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 011 1234-5678" />
            <span class="campo__error" id="errorTelefono"></span>
          </div>

          <div class="campo campo-completo">
            <label for="direccion">Dirección</label>
            <input type="text" id="direccion" name="direccion" placeholder="Calle, número, ciudad" />
            <span class="campo__error" id="errorDireccion"></span>
          </div>

          <div class="mensaje campo-completo" id="mensajeGlobal"></div>

          <button type="submit" class="btn-principal campo-completo" id="btnRegistro">
            Crear cuenta
          </button>

          <div class="divisor campo-completo">o</div>

          <a href="login.html" class="btn-secundario campo-completo">
            Ya tengo cuenta
          </a>

        </form>

      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/registro.js"></script>

</body>
</html>
